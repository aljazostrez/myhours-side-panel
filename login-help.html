<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360, initial-scale=1.0" />
  <title>My Hours Extension</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f5f5;
      width: 360px;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 24px 16px;
    }

    .logo {
      width: 120px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 24px;
    }

    .step {
      margin-bottom: 24px;
      color: #555;
      font-size: 14px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }

    .login-btn {
      background-color: #3B8FC2;
      color: #fff;
      margin-top: 8px;
    }

    .refresh-btn {
      background-color: #e0e0e0;
      color: #333;
      margin-top: 8px;
      border: none;
    }

    .button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://assets.myhours.com/webappassets/MyHoursAppLogo.png" alt="My Hours Logo" class="logo" />

    <h1>Welcome to the My Hours browser extension!</h1>

    <div class="step">
      <div>1. Sign in to My Hours</div>
      <a href="https://app.myhours.com/" target="_blank" class="button login-btn">Sign in</a>
    </div>

    <div class="step">
      <div>2. Refresh the extension</div>
      <button onclick="window.location.href='https://app.myhours.com/'" class="button refresh-btn">Refresh</button>
    </div>
  </div>
</body>
</html>
